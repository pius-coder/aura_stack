version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: aura
      POSTGRES_USER: aura
      POSTGRES_PASSWORD: ${PGPASSWORD:-aura_secret}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aura"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  evolution-api:
    image: atendai/evolution-api:v2.0.0
    environment:
      DATABASE_ENABLED: "false"
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-evolution_dev_key}
    ports:
      - "8080:8080"

  aura-app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://aura:${PGPASSWORD:-aura_secret}@postgres:5432/aura
      REDIS_URL: redis://redis:6379
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-evolution_dev_key}
      EVOLUTION_API_URL: http://evolution-api:8080
      BUSINESS_PHASE: mvp
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  pgdata:
